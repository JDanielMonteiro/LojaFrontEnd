<div class = "tela-login"> 
    <mat-card class="card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>Entre na sua conta e negocie com segurança!</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p class = "introducao">Acesse e aproveite uma experiência segura dentro da Motosbr.</p>
        <div class="divisor-login">
             <mat-form-field class ="field-email" appearance="outline">
                    <mat-label>Email</mat-label>
                    <input class = "caixa-email"
                    matInput
                    placeholder="pat@example.com"
                    [formControl]="email"
                    (blur)="updateErrorMessageEmail()"
                    required
                    />
                    @if (email.invalid) {
                    <mat-error>{{errorMessageEmail()}}</mat-error>
                    }
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Senha</mat-label>
                <input matInput [type]="hide() ? 'password' : 'text'"  [formControl]="password"
                    (blur)="updateErrorMessagePassword()"/>
                <button
                matIconButton
                matSuffix
                (click)="clickEvent($event)"
                [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide()"
                >
                <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                @if (password.invalid) {
                    <mat-error>{{errorMessagePassword()}}</mat-error>
                    }
            </mat-form-field>

            <button class = "acessar" matButton="filled">Acessar</button>
        </div>

        <div class = "link-pagina-cadastro">
            <p>Não tem uma conta? <a routerLink="/cadastro">Cadastre-se</a></p>
        </div>
    </mat-card-content>
    <mat-card-footer class="card-footer">
    </mat-card-footer>
    </mat-card>
</div>
